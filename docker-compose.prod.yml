services:
  mysql:
    image: mysql:8.0
    container_name: ddoya-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ddoya}
      MYSQL_USER: ${MYSQL_USER:-ddoya}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ddoya1234}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - ddoya-mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai:
    image: ${AI_IMAGE:-goring12/ddoya-ai:latest}
    container_name: ddoya-ai
    restart: unless-stopped
    environment:
      PORT: ${FASTAPI_PORT:-8000}
      TZ: Asia/Seoul
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL:-}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY:-}
      GMS_API_KEY: ${GMS_API_KEY:-}
      GMS_OPENAI_BASE_URL: ${GMS_OPENAI_BASE_URL:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AI_DB_HOST: ${AI_DB_HOST:-mysql}
      AI_DB_PORT: ${AI_DB_PORT:-3306}
      AI_DB_NAME: ${AI_DB_NAME:-ddoya}
      AI_DB_USERNAME: ${AI_DB_USERNAME:-ddoya_ai_reader}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-DdoyaAiReadOnly!123}
      DATABASE_URL: ${DATABASE_URL:-}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-/app/weights/yolo_pill_best.pt}
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    image: ${SPRING_IMAGE:-goring12/ddoya-backend:latest}
    container_name: ddoya-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SPRING_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ddoya}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ddoya}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-ddoya1234}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JWT_SECRET: ${JWT_SECRET:-local-secret-key_that_is_at_least_32_bytes_long_for_hs256!}
      FASTAPI_URL: ${AI_BASE_URL:-http://ai:8000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  app-network:
    driver: bridge

volumes:
  ddoya-mysql-data:
